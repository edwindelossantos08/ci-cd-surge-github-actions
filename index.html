<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Configuración básica del documento HTML -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD con GitHub Actions y Surge.sh</title>
    <style>
        /* Estilos generales para centrar el contenido en la pantalla */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 20px;
        }

        /* Tarjeta principal con efecto glassmorphism */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        /* Lista de tecnologías usadas en el despliegue */
        .stack {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 25px;
        }

        .badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .author {
            margin-top: 30px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <!-- Contenedor principal con la información del despliegue -->
    <div class="card">
        <h1>🚀 ¡Despliegue Automático!</h1>
        <p class="subtitle">
            Esta página se publicó automáticamente en Surge.sh
            mediante un pipeline de Integración Continua con GitHub Actions.
        </p>
        <div class="stack">
            <span class="badge">HTML5</span>
            <span class="badge">Git</span>
            <span class="badge">GitHub Actions</span>
            <span class="badge">Surge.sh</span>
            <span class="badge">CI/CD</span>
        </div>
        <p class="author">Edwin De Los Santos · 20251032</p>
    </div>
</body>
</html>
